name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create Neon test branch
        id: create-branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_BRANCH_ID: ${{ secrets.NEON_BRANCH_ID }}
        run: |
          BRANCH_URL=$(node scripts/setup-test-db.js)
          echo "database_url=$BRANCH_URL" >> $GITHUB_OUTPUT

      - name: Setup Database
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.database_url }}
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Run Playwright tests
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.database_url }}
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30